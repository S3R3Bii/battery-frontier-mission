name: Daily research report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * *"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python -m battery_frontier.cli validate
      - run: python -m battery_frontier.cli daily-report
      - name: Commit generated report
        run: |
          git config user.name "battery-frontier-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/daily
          git diff --cached --quiet || git commit -m "report: daily mission update"
          git push

