name: Daily research report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * *"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python -m battery_frontier.cli validate
      - run: python -m battery_frontier.cli physics-reference
      - run: python -m battery_frontier.cli aviation-reference
      - run: python -m battery_frontier.cli dashboard-artifacts
      - run: python -m battery_frontier.cli candidate-dossiers --execute-materials-project
        env:
          MP_API_KEY: ${{ secrets.MP_API_KEY }}
      - run: python -m battery_frontier.cli simulation-campaign
      - run: python -m battery_frontier.cli partner-dossiers
      - run: python -m battery_frontier.cli daily-report
      - run: python -m battery_frontier.cli website-data
      - name: Commit generated report
        run: |
          git config user.name "battery-frontier-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/daily reports/reference reports/aviation reports/dashboard reports/candidates reports/source-metadata reports/simulations reports/measurements reports/partners website/mission-control-data.json
          git diff --cached --quiet || git commit -m "report: daily mission and website update"
          git push
