name: Deploy mission-control website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "reports/**"
      - "configs/**"
      - "src/**"
      - "dashboard/**"
      - "schemas/**"
      - "pyproject.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e .
      - run: python -m battery_frontier.cli validate
      - run: python -m battery_frontier.cli physics-reference
      - run: python -m battery_frontier.cli aviation-reference
      - run: python -m battery_frontier.cli dashboard-artifacts
      - run: python -m battery_frontier.cli daily-report
      - run: python -m battery_frontier.cli website-data
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
