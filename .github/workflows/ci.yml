name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m battery_frontier.cli validate
      - run: python -m battery_frontier.cli physics-reference
      - run: python -m battery_frontier.cli aviation-reference
      - run: python -m battery_frontier.cli dashboard-artifacts
      - run: python -m pytest
      - run: python -m ruff check .
