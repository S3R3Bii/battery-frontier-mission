records:
  - id: scenario.regional_demonstrator
    version: 1
    name: Regional demonstrator sensitivity case
    evidence_class: speculative_hypothesis
    status: design_study
    description: A short-route anchor for validating units and sensitivity behavior.
    route_distance_km: 300
    aircraft_mass_kg: 5700
    payload_mass_kg: 800
    battery_mass_fraction: 0.35
    lift_to_drag_ratio: 14
    propulsion_efficiency: 0.82
    usable_depth_of_discharge: 0.80
    end_of_life_state_of_health: 0.80
    thermal_availability: 0.95
    reserve_fraction: 0.20
    non_cruise_energy_fraction: 0.20
    cruise_speed_m_per_s: 90
    uncertainty_note: All values are illustrative Phase 0 sensitivity inputs and require replacement or citation before external feasibility claims.
